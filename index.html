<style>
    :root {
        --primary-blue: #0d47a1;
        --secondary-green: #2e7d32;
        --accent-yellow: #fdd835;
        --light-bg: #f8f9fa;
        --gradient-start: #0d47a1;
        --gradient-end: #1e88e5;
    }

    body {
        font-family: 'Cairo', sans-serif;
        line-height: 1.8;
        color: #333;
        background-color: var(--light-bg);
        overflow-x: hidden;
        /* منع التمرير الأفقي في الشاشات الصغيرة */
    }

    /* تحسين الهيدر العلوي للطوارئ */
    .emergency-banner {
        background-color: #d32f2f;
        color: white;
        padding: 10px 5px;
        font-size: 0.9rem;
    }

    /* تحسين الهيرو (Hero Section) ليناسب الجوال */
    .hero-section {
        background: linear-gradient(-45deg, #0d47a1, #1565c0, #0d47a1, #1e88e5);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
        padding: 60px 0; /* تقليل البادينج للجوال */
        min-height: 80vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    @media (min-width: 768px) {
        .hero-section { padding: 120px 0; }
    }

    /* نصوص الهيرو المتجاوبة */
    .typed-text {
        font-size: 1.5rem; /* أصغر للجوال */
        font-weight: 700;
        border-left: 3px solid var(--accent-yellow);
        display: inline-block;
        padding-left: 10px;
    }

    @media (min-width: 768px) {
        .typed-text { font-size: 2.5rem; }
    }

    /* بطاقات الإحصائيات */
    .stat-card {
        background-color: white;
        padding: 20px 10px;
        border-radius: 20px;
        margin-bottom: 15px;
        border-right: 5px solid var(--secondary-green);
    }

    /* العناوين */
    .section-title {
        color: var(--primary-blue);
        font-weight: 700;
        font-size: 1.8rem;
        margin-bottom: 30px;
        position: relative;
        display: inline-block;
    }

    @media (min-width: 768px) {
        .section-title { font-size: 2.5rem; }
    }

    /* تحسين الجداول في الشاشات الصغيرة */
    .table-responsive {
        border-radius: 15px;
        overflow: hidden;
    }

    /* تحسين الصور */
    .img-fluid {
        max-width: 100%;
        height: auto;
    }

    /* تعديل الهوامش في وضع الجوال */
    @media (max-width: 767px) {
        .text-center-mobile {
            text-align: center !important;
        }
        .icon-box {
            font-size: 2rem;
        }
        .card {
            margin-bottom: 20px;
        }
    }

    /* باقي التأثيرات (التي وضعتها أنت سابقاً) */
    .navbar { background-color: var(--primary-blue); }
    .navbar.scrolled { background-color: rgba(13, 71, 161, 0.95); backdrop-filter: blur(10px); }
    .bubble { position: absolute; bottom: -50px; background: rgba(255,255,255,0.2); border-radius: 50%; animation: rise 10s infinite ease-in; }
    @keyframes rise { 0% { transform: translateY(0); opacity: 0.6; } 100% { transform: translateY(-120vh); opacity: 0; } }
    footer { background: #212121; color: #aaa; padding: 40px 0 20px; }
</style>
